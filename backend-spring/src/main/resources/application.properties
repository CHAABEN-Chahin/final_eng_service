server.port=${SERVER_PORT:3000}
spring.application.name=nursery-backend

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=false

# Logging
logging.level.org.springframework.data.mongodb=DEBUG

# Groq LLM API
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_MODEL:llama-3.1-8b-instant}

# HuggingFace Inference API (for vector embeddings)
huggingface.api.token=${HUGGINGFACE_API_TOKEN:}
