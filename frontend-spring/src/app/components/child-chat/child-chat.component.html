<div class="chat-page">
  <!-- Header -->
  <div class="chat-header">
    <button class="back-btn" (click)="goBack()">←</button>
    <div class="header-info">
      <div class="header-avatar">🤖</div>
      <div class="header-text">
        <h1>Assistant de {{ childName }}</h1>
        <p>Basé sur les observations quotidiennes</p>
      </div>
    </div>
  </div>

  <!-- Messages area -->
  <div class="messages-area" #messagesContainer>
    <div class="loading-spinner" *ngIf="isLoading"><div class="spinner"></div></div>

    <ng-container *ngIf="!isLoading">
      <div class="message-wrapper" *ngFor="let msg of messages"
           [class.user]="msg.role === 'user'"
           [class.assistant]="msg.role === 'assistant'">

        <div class="avatar" *ngIf="msg.role === 'assistant'">🤖</div>

        <div class="message-bubble" [class.typing]="msg.isTyping">
          <ng-container *ngIf="!msg.isTyping">
            <p *ngFor="let paragraph of msg.content.split('\n')" class="msg-text">
              {{ paragraph }}
            </p>
          </ng-container>
          <div class="typing-dots" *ngIf="msg.isTyping">
            <span></span><span></span><span></span>
          </div>
        </div>

        <div class="avatar user-avatar" *ngIf="msg.role === 'user'">👤</div>
      </div>

      <!-- Suggested questions -->
      <div class="suggestions" *ngIf="showSuggestions">
        <p class="suggestions-label">💡 Questions suggérées :</p>
        <div class="suggestions-grid">
          <button class="suggestion-btn"
                  *ngFor="let q of suggestedQuestions"
                  (click)="sendMessage(q)">
            {{ q }}
          </button>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-container">
      <textarea class="chat-input"
                [(ngModel)]="newMessage"
                (keydown)="onKeyDown($event)"
                placeholder="Posez une question sur votre enfant..."
                rows="1"
                [disabled]="isSending"></textarea>
      <button class="send-btn"
              [disabled]="isSending || !newMessage.trim()"
              (click)="sendMessage()">
        <span *ngIf="!isSending">➤</span>
        <span *ngIf="isSending" class="sending-spinner"></span>
      </button>
    </div>
  </div>
</div>
